
<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PT MESIN KASIR SOLO | Pusat Kasir & Jasa Website Terpercaya</title>
    <meta name="description" content="Pusat penjualan mesin kasir modern (POS), jasa pembuatan website SEO, dan aplikasi kasir online/offline terlengkap. Melayani pengiriman dan instalasi ke Seluruh Indonesia." />
    
    <!-- PWA Manifest & Theme -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FF5F1F" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- CRITICAL CSS: Mencegah White Flash & Styling App Shell -->
    <style>
      body { background-color: #050505; margin: 0; color: #fff; font-family: system-ui, -apple-system, sans-serif; }
      
      /* APP SHELL (Skeleton Loading) */
      .app-shell {
        display: flex; flex-direction: column; min-height: 100vh;
        opacity: 1; transition: opacity 0.3s ease-out;
      }
      .as-nav {
        height: 76px; border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 20px;
        position: fixed; top: 0; width: 100%; box-sizing: border-box; z-index: 50;
        background: rgba(5,5,5,0.9); backdrop-filter: blur(10px);
      }
      .as-logo { width: 160px; height: 40px; background: rgba(255,255,255,0.1); border-radius: 8px; }
      .as-links { display: none; gap: 20px; }
      .as-hero {
        flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
        text-align: center; padding: 20px; gap: 24px; margin-top: 60px;
        position: relative; overflow: hidden;
      }
      .as-blob {
        position: absolute; width: 300px; height: 300px; border-radius: 50%;
        background: rgba(255, 95, 31, 0.15); filter: blur(80px);
        top: 20%; right: 10%; z-index: -1;
      }
      .as-badge { width: 220px; height: 32px; background: rgba(255, 95, 31, 0.1); border-radius: 50px; border: 1px solid rgba(255, 95, 31, 0.2); }
      .as-h1 { width: 80%; max-width: 600px; height: 70px; background: rgba(255,255,255,0.1); border-radius: 12px; }
      .as-p { width: 60%; max-width: 450px; height: 24px; background: rgba(255,255,255,0.05); border-radius: 4px; }
      .as-btn-grp { display: flex; gap: 16px; margin-top: 10px; }
      .as-btn { width: 160px; height: 50px; background: rgba(255,255,255,0.1); border-radius: 12px; }

      @media(min-width: 768px) { 
        .as-links { display: flex; } 
        .as-link { width: 80px; height: 16px; background: rgba(255,255,255,0.05); border-radius: 4px; }
        .as-nav { padding: 0 5%; }
      }

      /* Animasi Denyut */
      .animate-pulse { animation: as-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
      @keyframes as-pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>

    <!-- Polyfills -->
    <script>
      if (typeof global === 'undefined') {
        window.global = window;
      }
      if (typeof process === 'undefined') {
        window.process = { env: { NODE_ENV: 'production' } };
      }
    </script>

    <script>
      // Peredam Error Console biar gak bikin panik
      (function() {
        const originalError = console.error;
        console.error = function(...args) {
          if (args[0] && typeof args[0] === 'string' && (args[0].includes('Minified React error #31') || args[0].includes('Objects are not valid as a React child'))) {
            return; 
          }
          originalError.apply(console, args);
        };
        
        window.addEventListener('error', function(e) {
          if (e.message && (e.message.includes('Minified React error #31') || e.message.includes('Objects are not valid as a React child'))) {
            e.stopImmediatePropagation();
            e.preventDefault();
            return true;
          }
        }, true);
      })();
    </script>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%23FF5F1F%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><rect x=%222%22 y=%223%22 width=%2220%22 height=%2214%22 rx=%222%22 ry=%222%22></rect><line x1=%228%22 y1=%2221%22 x2=%2216%22 y2=%2221%22></line><line x1=%2212%22 y1=%2217%22 x2=%2212%22 y2=%2221%22></line></svg>" type="image/svg+xml">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.89.0",
    "react-dom": "https://esm.sh/react-dom@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "vite": "https://esm.sh/vite@^7.3.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
  <body>
    <div id="root">
      <!-- APP SHELL: Muncul Instan Sebelum React Loading -->
      <div class="app-shell">
        <nav class="as-nav">
          <div class="as-logo animate-pulse"></div>
          <div class="as-links">
            <div class="as-link animate-pulse"></div>
            <div class="as-link animate-pulse"></div>
            <div class="as-link animate-pulse"></div>
            <div class="as-link animate-pulse"></div>
          </div>
        </nav>
        <div class="as-hero">
          <div class="as-blob"></div>
          <div class="as-badge animate-pulse"></div>
          <div class="as-h1 animate-pulse"></div>
          <div class="as-p animate-pulse"></div>
          <div class="as-btn-grp">
             <div class="as-btn animate-pulse"></div>
             <div class="as-btn animate-pulse" style="background: rgba(255,255,255,0.05)"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW Registered'))
            .catch(err => console.log('SW Failed:', err));
        });
      }
    </script>
  </body>
</html>
