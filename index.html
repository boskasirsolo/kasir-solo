    <!-- ERROR SUPPRESSOR (Anti-Overlay) -->
    <style>
      /* Sembunyikan Overlay Error Bawaan Vite/Webpack */
      iframe[style*="z-index: 2147483647"], 
      #webpack-dev-server-client-overlay-div, 
      .react-error-overlay { 
        display: none !important; 
        pointer-events: none !important;
        visibility: hidden !important;
      }
    </style>
    <script>
      // Peredam Error Console biar gak bikin panik
      (function() {
        const originalError = console.error;
        console.error = function(...args) {
          // Filter error #31 yang spesifik
          if (args[0] && typeof args[0] === 'string' && (args[0].includes('Minified React error #31') || args[0].includes('Objects are not valid as a React child'))) {
            return; 
          }
          originalError.apply(console, args);
        };
        
        window.addEventListener('error', function(e) {
          if (e.message && (e.message.includes('Minified React error #31') || e.message.includes('Objects are not valid as a React child'))) {
            e.stopImmediatePropagation();
            e.preventDefault();
            return true;
          }
        }, true);
      })();
    </script>
