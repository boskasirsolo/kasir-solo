    <!-- CRITICAL CSS & LOADER STYLE -->
    <style>
      body { background-color: #050505; margin: 0; color: #fff; font-family: 'Outfit', system-ui, sans-serif; overflow-x: hidden; }
      
      #mks-initial-loader {
        position: fixed; inset: 0; background: #050505; 
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 9999; 
        transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
      }

      #mks-initial-loader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .loader-ping {
        position: absolute; width: 500px; height: 500px; border-radius: 50%;
        background: rgba(255, 95, 31, 0.04); filter: blur(100px);
        z-index: -1; animation: ambientPulse 5s infinite;
      }

      @keyframes ambientPulse { 0%, 100% { transform: scale(1); opacity: 0.2; } 50% { transform: scale(1.2); opacity: 0.5; } }
    </style>

    <!-- Error Handler -->
    <script>
      window.addEventListener('error', function(e) {
        if (e.message && (e.message.includes('Minified React error') || e.message.includes('ImportMap'))) {
           e.stopImmediatePropagation(); e.preventDefault(); return true; 
        }
      });
    </script>
