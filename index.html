    <!-- CRITICAL CSS & LOADER STYLE -->
    <style>
      body { background-color: #050505; margin: 0; color: #fff; font-family: 'Outfit', system-ui, sans-serif; overflow-x: hidden; }
      
      /* --- PT MESIN KASIR SOLO - ULTRA PREMIUM LOADER --- */
      #mks-initial-loader {
        position: fixed; inset: 0; background: #050505; 
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 9999; transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .printer-slot {
        width: 220px; height: 12px; background: #1a1a1a;
        border-radius: 4px; position: relative;
        box-shadow: 0 0 20px rgba(255, 95, 31, 0.2);
        z-index: 10;
      }

      .receipt-paper {
        width: 180px; background: #fff; margin: 0 auto;
        position: relative; top: -6px; height: 0;
        animation: printReceipt 2.5s ease-out forwards;
        overflow: hidden; padding: 0 10px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        clip-path: polygon(0 0, 100% 0, 100% 95%, 95% 100%, 90% 95%, 85% 100%, 80% 95%, 75% 100%, 70% 95%, 65% 100%, 60% 95%, 55% 100%, 50% 95%, 45% 100%, 40% 95%, 35% 100%, 30% 95%, 25% 100%, 20% 95%, 15% 100%, 10% 95%, 5% 100%, 0 95%);
      }

      .receipt-text {
        color: #000; font-family: 'Courier New', Courier, monospace;
        font-size: 8px; font-weight: 900; line-height: 1.5;
        padding-top: 10px; opacity: 0;
        animation: showText 0.5s step-end 0.8s forwards;
      }

      @keyframes printReceipt {
        0% { height: 0; }
        100% { height: 140px; }
      }

      @keyframes showText {
        to { opacity: 1; }
      }

      .mks-loading-bar {
        width: 180px; height: 2px; background: rgba(255,255,255,0.05);
        margin-top: 20px; border-radius: 10px; overflow: hidden;
      }

      .mks-progress {
        width: 0%; height: 100%; background: #FF5F1F;
        box-shadow: 0 0 10px #FF5F1F;
        animation: growProgress 2s ease-in-out forwards;
      }

      @keyframes growProgress {
        to { width: 100%; }
      }

      .loader-label {
        color: #444; font-size: 9px; margin-top: 12px; font-weight: bold; letter-spacing: 2px;
        text-transform: uppercase;
      }

      /* Pulse decoration */
      .loader-ping {
        position: absolute; width: 300px; height: 300px; border-radius: 50%;
        background: rgba(255, 95, 31, 0.05); filter: blur(60px);
        z-index: -1; animation: pulse 3s infinite;
      }

      @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.2); opacity: 0.6; } }

      .animate-pulse { animation: as-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
      @keyframes as-pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
